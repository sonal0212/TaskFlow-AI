spring:
  application:
    name: taskflow-ai

  # ─── Supabase Postgres ────────────────────────────────────────────────
  # The DB URL points at Supabase's connection pooler (port 6543) for
  # serverless-friendly pooling, or the direct port (5432) for migrations.
  # Required env: SUPABASE_DB_URL, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD.
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 10000
      # Supabase requires SSL — leave commented for local Postgres dev
      # data-source-properties:
      #   sslmode: require

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Redis (local for dev, managed in prod) ───────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ─── AI ───────────────────────────────────────────────────────────────
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2

# ─── App-specific ──────────────────────────────────────────────────────
taskflow:
  jwt:
    issuer: taskflow-ai
    secret: ${JWT_SECRET:change-me-this-must-be-at-least-32-bytes-long-please}
    access-ttl-seconds: 900       # 15 min  (BRD §9.6)
    refresh-ttl-seconds: 604800   # 7 days  (BRD §9.6)
  bcrypt:
    pepper: ${BCRYPT_PEPPER:dev-pepper-do-not-use-in-prod}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api/v1/openapi.json
  swagger-ui:
    path: /api/v1/docs
