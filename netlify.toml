# Netlify configuration · TaskFlow AI
# ---------------------------------------------------------------
# Monorepo layout: this file lives at the repo root; the actual
# Next.js app is in `frontend/`. Setting `base` makes both the
# build command and the publish path resolve relative to that.
# ---------------------------------------------------------------

[build]
  base    = "frontend"
  command = "pnpm build"
  publish = ".next"

[build.environment]
  # Pin to the Node 20 LTS line. Next.js 14 supports 18.17+,
  # 20 is currently Netlify's default and a stable target.
  NODE_VERSION = "20"
  # Faster, quieter installs during CI
  NPM_FLAGS    = "--no-audit --no-fund"
  # Force pnpm — Netlify auto-detects this from pnpm-lock.yaml,
  # but declaring it makes builds deterministic if the lockfile
  # is ever regenerated.
  NETLIFY_USE_PNPM = "true"

# Next.js runtime plugin — handles SSR, ISR, image optimisation,
# and route handlers via Netlify Functions. Netlify auto-installs
# this for Next.js projects, but declaring it explicitly avoids
# any guessing.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Sensible default headers ───────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# Long-cache hashed Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Deploy preview / branch deploy context — same as production for
# this project. Override here later if you want different env.
[context.production]
  command = "pnpm build"

[context.deploy-preview]
  command = "pnpm build"

[context.branch-deploy]
  command = "pnpm build"
