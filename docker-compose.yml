# TaskFlow AI · local development stack
#
# Postgres lives in Supabase (hosted) — no local Postgres container needed.
# Redis is the only stateful service we run locally; in production it is
# managed (e.g. Upstash, ElastiCache, Render Redis).
#
# Usage:
#   docker compose up -d
#   cd backend  && SUPABASE_DB_URL=jdbc:postgresql://... ./gradlew bootRun
#   cd frontend && pnpm dev
#
# Optionally bring up a local Postgres for offline dev with:
#   docker compose --profile offline up -d

services:
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: local Postgres for offline development.
  # Schema is the same Flyway migration that runs against Supabase.
  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    profiles: ["offline"]
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  pg-data:
